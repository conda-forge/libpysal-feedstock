{% set python_min = "3.11" %}
{% set version = "4.15.0" %}

package:
  name: libpysal
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/l/libpysal/libpysal-{{ version }}.tar.gz
  sha256: db9eee1579678a2eec6974c831dc93abf612a4df5a3c45e9d7ed35ea5f9e2497

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - pytest-runner
    - setuptools >=61.0
    - setuptools-scm >=6.2
  run:
    - geodatasets
    - jinja2
    - python >={{ python_min }}
    - beautifulsoup4 >=4.13.0
    - geopandas >=1.1.0
    - numpy >=2.0.0
    - packaging >=24.1
    - pandas >=2.3.0
    - platformdirs >=4.3
    - requests >=2.32.0
    - scipy >=1.14.0
    - shapely >=2.1
    - scikit-learn >=1.5.0

test:
  imports:
    - libpysal
    - libpysal.cg
    - libpysal.cg.ops
    - libpysal.examples
    - libpysal.graph
    - libpysal.io
    - libpysal.io.geotable
    - libpysal.io.iohandlers
    - libpysal.io.tests
    - libpysal.io.util
    - libpysal.weights
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: http://pysal.org
  license: BSD-3-Clause
  license_file: LICENSE.txt
  summary: Core components of PySAL A library of spatial analysis functions

extra:
  recipe-maintainers:
    - ocefpaf
    - jGaboardi
    - martinfleis
